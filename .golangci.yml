version: "2"
run:
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: true
    lll:
      line-length: 140
    misspell:
      locale: US
    mnd:
      ignored-numbers:
        - "0o644"
        - "0o600"
        - "0o755"
        - "0o666"
        - "10"
        - "60"
        - "1024"
        - "2"
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unexported-return
          severity: warning
        - name: error-return
          severity: warning
        - name: error-naming
          severity: warning
        - name: var-naming
          severity: warning
        - name: range
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-declaration
          severity: warning
        - name: package-comments
          severity: warning
        - name: range-val-in-closure
          severity: warning
        - name: range-val-address
          severity: warning
        - name: unhandled-error
          severity: warning
          arguments:
            - "fmt\\.Print.*"
            - "fmt\\.Fprint.*"
        - name: errorf
          severity: warning
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - errcheck
          - gosec
        path: cmd/
      - linters:
          - govet
        path: .*_test\.go
        text: 'shadow: declaration.*shadows'
    paths:
      - bin
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ademidoff/supavisor
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.gen\.go$
      - bin
      - vendor
      - third_party$
      - builtin$
      - examples$

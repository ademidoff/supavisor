[supavisor]
; logfile=/tmp/supavisor.log
pidfile=/tmp/supavisor.pid
socket=/tmp/supavisor.sock
; log_format=json  ; Options: text (default), json

[program:process1]
command=/bin/sleep 5
autostart=true
autorestart=always
stdout_logfile=/tmp/process1.log
stderr_logfile=/tmp/process1.log

[program:process2]
command=/bin/sleep 10
autostart=true
autorestart=never
depends_on=process1
stop_on_dependency_failure=true
stdout_logfile=/tmp/process2.log
stderr_logfile=/tmp/process2.log

[program:process3]
command=/bin/sleep 15
autostart=true
autorestart=always
stdout_logfile=/tmp/process3.log
stderr_logfile=/tmp/process3.log
